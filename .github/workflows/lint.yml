name: Lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run shellcheck
        run: |
          shellcheck -S warning \
            bootstrap.sh \
            dot \
            setup/scripts/*.sh \
            setup/linux/*.sh \
            setup/mac/*.sh \
            config/agent-notify/*.sh \
            config/aerospace/*.sh \
            config/git/hooks/pre-commit

  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Sync dependencies
        run: uv sync
      - name: Ruff
        run: uv run ruff check

  zsh-syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install zsh
        run: sudo apt-get update && sudo apt-get install -y zsh
      - name: Check zsh file syntax
        run: |
          for f in config/zsh/*.zsh config/zsh/.zshrc config/zsh/.zshenv config/zsh/.zprofile; do
            echo "checking $f"
            zsh -n "$f"
          done
