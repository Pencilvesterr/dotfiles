# Personal-machine symlinks. Mutually exclusive with work.yaml — both claim
# ~/.gitconfig, and the last-applied layer wins (relink updates the symlink).

- defaults:
    link:
      create: true
      relink: true

- link:
    ~/.claude/settings.json: config/claude/settings.personal.json
    ~/.codex/config.toml: config/codex/config.personal.toml
    ~/.codex/hooks.json: config/codex/hooks.personal.json
    ~/.gitconfig: config/git/global-config/personal.gitconfig
