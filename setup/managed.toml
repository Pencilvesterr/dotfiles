# Files managed by third-party apps that overwrite symlinks, so they are
# copied instead of linked.
#   ./dot pull   copies system -> repo
#   ./dot sync   pulls machine changes into the repo for review
#   ./dot sync --overwrite-managed-with-repo-version
#                explicitly copies repo -> system
#
# Each entry applies on every machine unless narrowed with:
#   context = "work" | "personal"
#   os      = "mac"  | "linux"

[[files]]
repo = "config/htop/htoprc"
system = "~/.config/htop/htoprc"

[[files]]
repo = "private/arc/StorableSidebar.json"
system = "~/Library/Application Support/Arc/StorableSidebar.json"
context = "work"
os = "mac"
