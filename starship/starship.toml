# === Settings

add_newline = true
command_timeout = 2000
palette = "nord"

# === Colour

# === Prompt Formats

[hostname]
ssh_symbol = "¯¼ü "
ssh_only = true
disabled = false

[directory]
style = 'bold fg:dark_blue'
format = '[$path ]($style)'
truncation_length = 3
truncation_symbol = 'ÔÇĞ/'
truncate_to_repo = false

[directory.substitutions]
'Documents' = '¾░êÖ'
'Downloads' = '´ÇÖ '
'Music' = '´Çü '
'Pictures' = '´Ç¥ '

[git_branch]
style = 'fg:green'
symbol = '´Éİ '
format = '[on](white) [$symbol$branch ]($style)'

[git_status]
disabled = false
format = '([\[$all_status$ahead_behind\]]($style) )'
style = "red bold"
stashed = '*${count}'
ahead = "Ôçí${count}"
behind = "Ôçú${count}"
diverged = "Ôçò${count}"
conflicted = "=${count}"
deleted = "Ô£İ${count}"
renamed = "┬╗${count}"
modified = "!${count}"
staged = "+${count}"
untracked = "?${count}"

[fill]
symbol = ' '

[python]
style = 'teal'
symbol = '¯êÁ '
format = '[${symbol}${pyenv_prefix}(${version} )(\($virtualenv\) )]($style)'
pyenv_version_name = true
pyenv_prefix = ''

[java]
symbol = "¯ëû "
format = '[${symbol}(${version} )]($style)'

[lua]
format = '[$symbol($version )]($style)'
symbol = '¯İá '

[nodejs]
style = 'blue'
symbol = '¯£İ '
format = '[$symbol($version )]($style)'


[golang]
style = 'blue'
symbol = '¯İğ '

[haskell]
