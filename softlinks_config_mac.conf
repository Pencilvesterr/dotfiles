# macOS-only symlinks - applied automatically on Darwin by install.sh

$(pwd)/vscode/settings.json:$HOME/Library/Application Support/Code/User/settings.json
$(pwd)/vscode/keybindings.json:$HOME/Library/Application Support/Code/User/keybindings.json
$(pwd)/aerospace/aerospace.toml:$HOME/.config/aerospace/aerospace.toml
$(pwd)/aerospace/move-apps-to-workspace.sh:$HOME/.config/aerospace/move-apps-to-workspace.sh
